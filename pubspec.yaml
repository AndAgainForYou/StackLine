name: stackline
description: A modern block puzzle game — place Tetris shapes on a 10x10 grid.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.13.0
  intl: any
  cupertino_icons: ^1.0.8
  flame: ^1.22.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  shared_preferences: ^2.3.5
  audioplayers: ^6.1.0
  vibration: ^2.0.1
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_native_splash:
  color: "#0B0C10"
  image: assets/splash/logo.png
  android_12:
    color: "#0B0C10"
    image: assets/splash/logo.png
  ios: true
  android: true
  web: false

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/splash/
